<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Login Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  overflow: hidden;
}

/* Floating background shapes */
body::before, body::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(0, 255, 255, 0.15);
  border-radius: 50%;
  filter: blur(80px);
  animation: float 6s infinite alternate;
}

body::after {
  background: rgba(255, 0, 150, 0.15);
  top: 20%;
  left: 60%;
}

body::before {
  top: 60%;
  left: 20%;
}

@keyframes float {
  from { transform: translateY(0px) scale(1); }
  to { transform: translateY(-40px) scale(1.2); }
}

/* Login Card */
.login-box {
  width: 350px;
  padding: 40px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  transform: perspective(1000px);
  animation: popIn 1s ease;
}

.login-box:hover {
  transform: perspective(1000px) rotateY(5deg) rotateX(5deg);
  transition: 0.5s;
}

@keyframes popIn {
  from {
    opacity: 0;
    transform: scale(0.8);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.login-box h2 {
  text-align: center;
  color: #fff;
  margin-bottom: 30px;
  letter-spacing: 2px;
}

.input-box {
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: none;
  outline: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  transition: 0.3s;
}

.input-box input:focus {
  background: rgba(255,255,255,0.35);
  transform: scale(1.05);
}

.input-box input::placeholder {
  color: #ddd;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

.extra {
  text-align: center;
  margin-top: 15px;
  color: #ccc;
  font-size: 14px;
}

.extra a {
  color: #00c6ff;
  text-decoration: none;
}

/* MESSAGE */
#msg{
  text-align:center;
  margin-top:15px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>LOGIN</h2>

  <div class="input-box">
    <input type="text" placeholder="Username">
  </div>

  <div class="input-box">
    <input type="password" placeholder="Password">
  </div>

  <button onclick="login()">Login</button>

  <div id="msg"></div>

  <div class="extra">
    Don't have an account? <a href="register.html">Sign Up</a>
  </div>
</div>

<script>
function login(){

let inputs = document.querySelectorAll(".input-box input");
let user = inputs[0].value;
let pass = inputs[1].value;
let msg = document.getElementById("msg");

if(user=="" || pass==""){
msg.style.color="red";
msg.innerText="⚠ Please fill all fields";
return;
}

// success
msg.style.color="lightgreen";
msg.innerText="🎉 Login Successful! Redirecting...";

// redirect to home page
setTimeout(()=>{
window.location.href="index.html";
},2000);

}
</script>

</body>
</html>
