<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Roadmap</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: radial-gradient(circle, #0f172a, #020617);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 40px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  z-index:10;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:cyan;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:100px;
  font-size:42px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px cyan; }
  to{ text-shadow:0 0 30px #00bfff; }
}

/* ROADMAP WRAPPER */
.roadmap{
  position:relative;
  width:100%;
  max-width:900px;
  margin:60px auto;
  display:flex;
  flex-direction:column;
  gap:40px;
  padding:20px;
}

/* CENTER LINE */
.roadmap::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  width:3px;
  height:100%;
  background:cyan;
  transform:translateX(-50%);
  box-shadow:0 0 15px cyan;
}

/* STEP */
.step{
  width:45%;
  padding:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid cyan;
  border-radius:15px;
  backdrop-filter:blur(10px);
  position:relative;
  transition:0.4s;
  animation:float 4s infinite ease-in-out;
  transform-style:preserve-3d;
}

/* LEFT & RIGHT */
.step.left{
  align-self:flex-start;
}

.step.right{
  align-self:flex-end;
}

/* DOT */
.step::before{
  content:"";
  position:absolute;
  width:14px;
  height:14px;
  background:cyan;
  border-radius:50%;
  top:20px;
  box-shadow:0 0 10px cyan;
}

.step.left::before{
  right:-36px;
}

.step.right::before{
  left:-36px;
}

/* 3D HOVER */
.step:hover{
  transform:translateY(-8px) rotateX(6deg) rotateY(6deg);
  box-shadow:0 0 25px cyan;
}

/* FLOAT ANIMATION (safe now) */
@keyframes float{
  0%,100%{ transform:translateY(0px); }
  50%{ transform:translateY(-8px); }
}

/* TEXT */
.step h3{
  color:cyan;
  margin-bottom:6px;
}

.step p{
  font-size:14px;
  opacity:0.8;
}

</style>
</head>

<body>

<header>
  <div class="logo">My Roadmap</div>
</header>

<h1 class="title">Frontend Developer Roadmap</h1>

<div class="roadmap">

  <div class="step left">
    <h3>Step 1</h3>
    <p>Learn HTML Basics & Structure</p>
  </div>

  <div class="step right">
    <h3>Step 2</h3>
    <p>Master CSS Flexbox & Grid</p>
  </div>

  <div class="step left">
    <h3>Step 3</h3>
    <p>JavaScript Fundamentals</p>
  </div>

  <div class="step right">
    <h3>Step 4</h3>
    <p>Build Real Projects</p>
  </div>

  <div class="step left">
    <h3>Step 5</h3>
    <p>Learn React / Frameworks</p>
  </div>

  <div class="step right">
    <h3>Step 6</h3>
    <p>Apply for Jobs & Internships</p>
  </div>

</div>

</body>
</html>
